{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="{% static 'css/site.css' %}">
    <link rel="icon" href="{% static 'img/Python.png' %}" type="image/x-icon"> 

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>{% block title %}{% endblock %} App-222</title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

           <div class="d-flex align-items-center gap-2">

    <a class="navbar-brand" href="/">App-222</a>

    <a href="{% url 'transfer' %}" class="text-light">
        <i class="bi bi-braces"></i>
    </a>

    <a href="{% url 'forms' %}" class="text-light">
        <i class="bi bi-card-list"></i>
    </a>

    <a href="#" class="text-light">
        <i class="bi bi-shield-check"></i>
    </a>

</div>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link active" href="/">Home</a>
                    </li>
                </ul>

                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search"/>
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>

            </div>
        </div>
    </nav>
</header>

<main class="container mt-3">



    {% block main_content %}
    {% endblock %}

</main>

<footer class="bg-dark text-light mt-4">
    <div class="container py-4">
        <div class="row">

            <div class="col-md-4 mb-3">
                <h6 class="fw-bold d-flex align-items-center gap-2">
                    <i class="bi bi-info-circle me-2"></i>Про проєкт
                </h6>
                <p class="small mb-0">
                    <i class="bi bi-info-circle me-2"></i>
                    Навчальний проєкт з Django.
                </p>
            </div>

            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">
                    <i class="bi bi-list me-2"></i>Навігація
                </h6>
                <ul class="list-unstyled small">
                    <li>
                        <a href="/" class="text-decoration-none text-light">
                            <i class="bi bi-house me-2"></i>Home
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'transfer' %}" class="text-decoration-none text-light">
                            <i class="bi bi-braces me-2"></i>Контекст
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'forms' %}" class="text-decoration-none text-light">
                            <i class="bi bi-card-list me-2"></i>Форми
                        </a>
                    </li>
                    <li>
                        <a href="#" class="text-decoration-none text-light">
                            <i class="bi bi-shield-check me-2"></i>Політика
                        </a>
                    </li>
                </ul>
            </div>

            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">
                    <i class="bi bi-envelope me-2"></i>Контакти
                </h6>
                <p class="small mb-0">
                    © 2026 IT STEP University<br>
                    Email: example@email.com
                </p>
            </div>

        </div>
    </div>
</footer>

<script src="{% static 'js/site.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
